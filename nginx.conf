server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security headers ──────────────────────────────────────────
    # Prevent XSS attacks
    add_header X-XSS-Protection          "1; mode=block"              always;
    # Prevent MIME sniffing
    add_header X-Content-Type-Options    "nosniff"                    always;
    # Prevent clickjacking
    add_header X-Frame-Options           "DENY"                       always;
    # Control referrer information
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # Content Security Policy — restricts where resources can load from
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://fonts.googleapis.com;
         style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com;
         font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
         img-src 'self' data: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://unpkg.com;
         connect-src 'self' https://data.lacity.org https://api.openrouteservice.org https://nominatim.openstreetmap.org;
         frame-ancestors 'none';"
        always;

    # ── Cache static assets ───────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Health check endpoint ─────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"SafeRoute LA"}';
        add_header Content-Type application/json;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Hide server version ───────────────────────────────────────
    server_tokens off;
}
