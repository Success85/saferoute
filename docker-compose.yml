# ═══════════════════════════════════════════════════════════════
# SafeRoute LA — docker-compose.yml
# Run with: docker-compose up -d
# ═══════════════════════════════════════════════════════════════

version: '3.8'

services:

  # ── SafeRoute LA Frontend ─────────────────────────────────────
  saferoute-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saferoute-la
    ports:
      - "80:80"       # Access at http://localhost
      - "443:443"     # HTTPS (if SSL cert is mounted)
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - TZ=America/Los_Angeles
    networks:
      - saferoute-net

networks:
  saferoute-net:
    driver: bridge

# ═══════════════════════════════════════════════════════════════
# Usage:
#   Build and start:  docker-compose up -d --build
#   View logs:        docker-compose logs -f
#   Stop:             docker-compose down
#   Status:           docker-compose ps
# ═══════════════════════════════════════════════════════════════
